<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<link rel="stylesheet" href="css/style.css">

<style>

.error-page{

height:80vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;

}

.error-page h1{

font-size:120px;
color:#0d6efd;
margin-bottom:20px;

}

.error-page h2{

font-size:35px;
margin-bottom:15px;

}

.error-page p{

font-size:18px;
color:#555;
margin-bottom:30px;

}

.error-page a{

display:inline-block;
padding:12px 25px;
background:#0d6efd;
color:white;
text-decoration:none;
border-radius:8px;

}

.error-page a:hover{

background:#084298;

}

</style>

</head>

<body>

<div class="error-page">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>

The page you are looking for does not exist
or may have been moved.

</p>

<a href="index.html">

Go Back Home

</a>

</div>

</body>

</html>
